<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Live Object Detector</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0b0f17" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Detector" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <style>
    :root { --accent: #22d3ee; --bg: #0b0f17; }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: #e5e7eb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
    #stage { position: fixed; inset: 0; display: grid; place-items: center; }
    #wrap { position: relative; width: 100%; height: 100%; }
    video, canvas { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    video { transform: scaleX(1); }
    canvas { z-index: 2; }

    /* top status pill */
    #hud { position: fixed; top: env(safe-area-inset-top, 12px); left: 0; right: 0; z-index: 5;
      display: flex; justify-content: center; pointer-events: none; padding-top: 12px; }
    #pill { background: rgba(11,15,23,.72); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.08); border-radius: 999px; padding: 8px 16px;
      font-size: 13px; font-weight: 600; letter-spacing: .2px; display: flex; gap: 10px; align-items: center; }
    #dot { width: 8px; height: 8px; border-radius: 50%; background: #f59e0b; box-shadow: 0 0 10px #f59e0b; }
    #dot.live { background: #34d399; box-shadow: 0 0 10px #34d399; }
    #fps { color: var(--accent); }

    /* start overlay */
    #gate { position: fixed; inset: 0; z-index: 10; display: grid; place-items: center;
      background: radial-gradient(1200px 600px at 50% -10%, #14233a 0%, var(--bg) 60%); text-align: center; padding: 28px; }
    #gate h1 { font-size: 26px; font-weight: 800; letter-spacing: -.5px; margin-bottom: 8px; }
    #gate h1 span { color: var(--accent); }
    #gate p { color: #94a3b8; font-size: 14px; max-width: 320px; line-height: 1.5; margin: 0 auto 26px; }
    #go { appearance: none; border: 0; cursor: pointer; font: inherit; font-weight: 700; font-size: 17px;
      color: #06121a; background: var(--accent); padding: 15px 38px; border-radius: 14px;
      box-shadow: 0 8px 30px rgba(34,211,238,.35); transition: transform .12s ease; }
    #go:active { transform: scale(.96); }
    #note { margin-top: 18px; font-size: 12px; color: #64748b; }

    /* bottom controls */
    #bar { position: fixed; bottom: env(safe-area-inset-bottom, 16px); left: 0; right: 0; z-index: 5;
      display: flex; justify-content: center; gap: 10px; padding-bottom: 16px; pointer-events: none; }
    .btn { pointer-events: auto; background: rgba(11,15,23,.72); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.1); color: #e5e7eb; border-radius: 999px;
      padding: 11px 18px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn:active { transform: scale(.96); }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="stage">
    <div id="wrap">
      <video id="video" playsinline muted></video>
      <canvas id="canvas"></canvas>
    </div>
  </div>

  <div id="hud" class="hidden">
    <div id="pill"><span id="dot"></span><span id="label">chargement…</span><span id="fps"></span></div>
  </div>

  <div id="bar" class="hidden">
    <button class="btn" id="flip">↺ Caméra</button>
  </div>

  <div id="gate">
    <div>
      <h1>Live <span>Object</span> Detector</h1>
      <p>Détection d'objets en temps réel dans le navigateur. Le modèle tourne sur ton appareil — aucune image envoyée.</p>
      <button id="go">Activer la caméra</button>
      <div id="note">COCO-SSD · TensorFlow.js · 80 classes</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const gate = document.getElementById("gate");
    const go = document.getElementById("go");
    const hud = document.getElementById("hud");
    const bar = document.getElementById("bar");
    const dot = document.getElementById("dot");
    const labelEl = document.getElementById("label");
    const fpsEl = document.getElementById("fps");

    const PALETTE = ["#22d3ee","#34d399","#f59e0b","#f472b6","#a78bfa","#60a5fa","#fb7185","#fbbf24"];
    let model = null, stream = null, facing = "environment", running = false, lastT = 0, fpsAvg = 0;

    // --- Temporal smoothing: match detections frame-to-frame and ease the
    //     boxes with an ADAPTIVE EMA — follow fast when the object moves a lot,
    //     stabilise hard when it's still. Kills both jitter (static) and lag
    //     (moving). Tracks survive a few missed frames so a dropout doesn't
    //     make a box blink. ---
    const EASE_MIN = 0.25;     // easing when the box barely moves (max stability)
    const EASE_MAX = 0.85;     // easing when it moves a lot (max responsiveness)
    const MATCH_IOU = 0.3;     // min IoU to consider two boxes the same object
    const MAX_MISSES = 6;      // frames a track survives without a match
    let tracks = [];
    let nextId = 1;

    function iou(a, b) {
      const x1 = Math.max(a[0], b[0]), y1 = Math.max(a[1], b[1]);
      const x2 = Math.min(a[0] + a[2], b[0] + b[2]), y2 = Math.min(a[1] + a[3], b[1] + b[3]);
      const w = Math.max(0, x2 - x1), h = Math.max(0, y2 - y1);
      const inter = w * h;
      const uni = a[2] * a[3] + b[2] * b[3] - inter;
      return uni > 0 ? inter / uni : 0;
    }

    function smooth(preds) {
      const used = new Set();
      for (const t of tracks) {
        let best = -1, bestIoU = MATCH_IOU;
        for (let i = 0; i < preds.length; i++) {
          if (used.has(i) || preds[i].class !== t.class) continue;
          const v = iou(t.bbox, preds[i].bbox);
          if (v > bestIoU) { bestIoU = v; best = i; }
        }
        if (best >= 0) {
          used.add(best);
          const b = preds[best].bbox;
          // adaptive easing from box-center displacement relative to box size
          const cx0 = t.bbox[0] + t.bbox[2] / 2, cy0 = t.bbox[1] + t.bbox[3] / 2;
          const cx1 = b[0] + b[2] / 2, cy1 = b[1] + b[3] / 2;
          const dist = Math.hypot(cx1 - cx0, cy1 - cy0);
          const sizeRef = Math.max(20, (t.bbox[2] + t.bbox[3]) / 2);
          const a = Math.min(EASE_MAX, EASE_MIN + dist / sizeRef);
          for (let k = 0; k < 4; k++) t.bbox[k] += a * (b[k] - t.bbox[k]);
          t.score += 0.3 * (preds[best].score - t.score);
          t.misses = 0;
        } else {
          t.misses++;
        }
      }
      for (let i = 0; i < preds.length; i++) {
        if (used.has(i)) continue;
        tracks.push({ id: nextId++, class: preds[i].class, bbox: preds[i].bbox.slice(), score: preds[i].score, misses: 0 });
      }
      tracks = tracks.filter(t => t.misses <= MAX_MISSES);
      return tracks;
    }

    function fit() {
      const r = video.videoWidth / video.videoHeight || 16 / 9;
      // canvas drawing buffer matches the video's native resolution
      canvas.width = video.videoWidth || 1280;
      canvas.height = video.videoHeight || 720;
    }

    async function start() {
      go.disabled = true;
      go.textContent = "Chargement du modèle…";
      try {
        model = await cocoSsd.load({ base: "mobilenet_v2" });   // more accurate base (tighter boxes, fewer misses)
      } catch (e) {
        go.textContent = "Erreur chargement modèle";
        return;
      }
      await openCamera();
      gate.classList.add("hidden");
      hud.classList.remove("hidden");
      bar.classList.remove("hidden");
      running = true;
      loop();
    }

    async function openCamera() {
      if (stream) stream.getTracks().forEach(t => t.stop());
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: facing }, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false,
      });
      video.srcObject = stream;
      await video.play();
      fit();
    }

    function draw(items) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.lineWidth = Math.max(2, canvas.width / 320);
      ctx.font = `${Math.max(14, canvas.width / 45)}px -apple-system, sans-serif`;
      ctx.textBaseline = "top";
      for (const t of items) {
        const [x, y, w, h] = t.bbox;
        const color = PALETTE[t.id % PALETTE.length];   // stable colour per tracked object
        ctx.strokeStyle = color;
        ctx.strokeRect(x, y, w, h);
        const text = `${t.class} ${(t.score * 100) | 0}%`;
        const tw = ctx.measureText(text).width + 12;
        const th = parseInt(ctx.font) + 8;
        ctx.fillStyle = color;
        ctx.fillRect(x, Math.max(0, y - th), tw, th);
        ctx.fillStyle = "#06121a";
        ctx.fillText(text, x + 6, Math.max(0, y - th) + 4);
      }
    }

    async function loop() {
      if (!running) return;
      if (canvas.width !== video.videoWidth && video.videoWidth) fit();
      const preds = await model.detect(video, 20, 0.4);   // up to 20 boxes, surface scores >= 0.40
      const stable = smooth(preds);
      draw(stable);
      dot.classList.add("live");
      const now = performance.now();
      const fps = lastT ? (1000 / (now - lastT)) : 0;
      lastT = now;
      fpsAvg = fpsAvg ? fpsAvg + 0.1 * (fps - fpsAvg) : fps;   // smoothed fps readout
      labelEl.textContent = stable.length ? `${stable.length} objet(s)` : "rien détecté";
      fpsEl.textContent = `${fpsAvg.toFixed(0)} fps`;
      requestAnimationFrame(loop);
    }

    go.addEventListener("click", start);
    document.getElementById("flip").addEventListener("click", async () => {
      facing = facing === "environment" ? "user" : "environment";
      tracks = [];   // drop stale tracks when the view changes
      try { await openCamera(); } catch (e) {}
    });

    // PWA: register the service worker so the app installs and shell-caches.
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
    }
  </script>
</body>
</html>
